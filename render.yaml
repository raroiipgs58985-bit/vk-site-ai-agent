services:
  - type: web
    name: vk-site-ai-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 600 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: SITE_BASE_URL
        value: https://wh40k.lexicanum.com/
      - key: SITE_SEARCH_MODE
        value: mediawiki
      - key: MEDIAWIKI_API_URL
        value: https://wh40k.lexicanum.com/mediawiki/api.php
      - key: MEDIAWIKI_ARTICLE_PATH
        value: /wiki/{title}
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AGENT_SECRET
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: SITE_MAX_PAGES
        value: "40"
      - key: SITE_DEEP_MAX_PAGES
        value: "100"
      - key: MEDIAWIKI_RESULTS_PER_QUERY
        value: "8"
      - key: MEDIAWIKI_DEEP_RESULTS_PER_QUERY
        value: "15"
      - key: MEDIAWIKI_QUERY_LIMIT
        value: "6"
      - key: MEDIAWIKI_DEEP_QUERY_LIMIT
        value: "8"
      - key: SITE_CONCURRENCY
        value: "3"
      - key: SITE_REQUEST_DELAY
        value: "0.5"
      - key: RESPECT_ROBOTS_TXT
        value: "true"
